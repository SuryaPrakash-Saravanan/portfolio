<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Developer profile avatar for Surya Prakash S</title>
  <desc id="desc">A premium circular black and white developer avatar with initials SP.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="66%">
      <stop offset="0%" stop-color="#3A3D42"/>
      <stop offset="58%" stop-color="#111317"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ring" x1="78" y1="65" x2="548" y2="573" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.42" stop-color="#AEB7C4"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="code" x1="170" y1="220" x2="470" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#8B96A6"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.75 0 1 0 0 0.82 0 0 1 0 0.95 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="320" cy="320" r="296"/>
    </clipPath>
  </defs>
  <circle cx="320" cy="320" r="318" fill="#000000"/>
  <circle cx="320" cy="320" r="302" stroke="url(#ring)" stroke-width="8"/>
  <g clip-path="url(#circleClip)">
    <rect width="640" height="640" fill="url(#bg)"/>
    <path d="M0 475C88 416 176 395 264 415C358 437 442 505 640 414V640H0V475Z" fill="#050608"/>
    <path d="M74 148H566" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
    <path d="M70 492H570" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
    <path d="M148 74V566" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2"/>
    <path d="M492 74V566" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2"/>
    <g filter="url(#softGlow)" opacity="0.88">
      <path d="M211 303L169 344L211 385" stroke="url(#code)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M429 303L471 344L429 385" stroke="url(#code)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M352 251L289 421" stroke="url(#code)" stroke-width="24" stroke-linecap="round"/>
