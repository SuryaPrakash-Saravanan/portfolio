    <circle cx="320" cy="320" r="212" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="10 18"/>
    <text x="320" y="518" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="92" font-weight="800" text-anchor="middle" letter-spacing="3">SP</text>
    <text x="320" y="562" fill="#CDD3DD" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600" text-anchor="middle" letter-spacing="5">CSE</text>
